<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Gölge Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --matrix-green: #00ff41;
            --pure-green: #0f0;
            --bg-black: #000;
            --neon-pink: #ff00ff;
            --neon-blue: #00e5ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Orbitron', sans-serif;
            background-color: var(--bg-black);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .content-layer {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
        }

        .container {
            max-width: 900px;
            width: 95%;
            margin: auto;
            padding: 60px 20px;
            text-align: center;
        }

        h1 {
            font-size: clamp(24px, 6vw, 48px);
            color: var(--neon-blue);
            text-shadow: 0 0 20px var(--neon-blue);
            margin-bottom: 30px;
            letter-spacing: 2px;
            cursor: default; /* Öğrenci şüphelenmesin */
            user-select: none;
        }

        .intro-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 2px 2px 10px #000;
        }

        .main-btn {
            margin: 30px 0;
            padding: 20px 50px;
            border: 2px solid var(--matrix-green);
            background: rgba(0, 0, 0, 0.85);
            color: var(--matrix-green);
            font-family: 'Orbitron';
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 12px;
            box-shadow: 0 0 20px var(--matrix-green);
            transition: all 0.3s ease;
        }

        .main-btn:hover:not(:disabled) {
            background: var(--matrix-green);
            color: black;
            box-shadow: 0 0 40px var(--matrix-green);
            transform: scale(1.05);
        }

        .main-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .qr-section {
            margin-top: 20px;
            padding: 30px;
            background: rgba(255, 0, 255, 0.05);
            border: 1px solid var(--neon-pink);
            border-radius: 30px;
            display: inline-block;
            backdrop-filter: blur(10px);
        }

        .qr-image {
            background: white;
            padding: 10px;
            border-radius: 15px;
            width: 180px;
            height: 180px;
            margin: 0 auto;
        }

        .panel {
            display: none;
            margin-top: 50px;
            width: 100%;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--neon-blue);
            border-radius: 15px;
            padding: 20px;
            text-align: left;
            backdrop-filter: blur(5px);
        }

        .title {
            color: var(--neon-blue);
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.3);
        }

        .value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #fff;
            word-break: break-all;
        }

        /* --- GİZLİ ADMİN PANELİ STİLLERİ --- */
        #admin-portal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            padding: 20px;
            overflow-y: auto;
            border: 4px solid var(--neon-pink);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--neon-pink);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .log-entry {
            background: #111;
            border: 1px solid #333;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 12px;
            font-family: 'JetBrains Mono';
            display: grid;
            grid-template-columns: 1fr 1fr 2fr;
        }

        .footer { margin-top: 80px; padding: 40px; text-align: center; }
        .footer-quote { color: var(--matrix-green); font-style: italic; }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="content-layer">
        <div class="container">
            <!-- BAŞLIĞA 5 KEZ TIKLAMAK ADMİN PANELİNİ AÇAR -->
            <h1 id="secret-trigger">Dijital Gölgen Kimin Ellerinde?</h1>
            
            <p class="intro-text">Dijital Gölge Analizine Hoş Geldin.</p>
            <p class="intro-text">Dijital ayak izinin ne kadar derin olduğunu keşfet.</p>
            
            <button class="main-btn" id="analyze-btn" onclick="runAnalysis()">SİSTEMİ ANALİZ ET</button>

            <div class="qr-section">
                <h2 style="color: var(--neon-pink); margin-bottom: 10px;">📱 MOBİL ERİŞİM</h2>
                <img id="qr-code" class="qr-image" src="" alt="QR">
                <p style="margin-top: 15px; font-size: 12px; color: #aaa;">Hemen okut, telefondan devam et</p>
            </div>

            <div class="panel" id="panel">
                <div class="grid" id="results-grid">
                    <!-- Kartlar buraya gelecek -->
                </div>
            </div>
        </div>

        <footer class="footer">
            <p class="footer-quote">“Gerçek farkındalık, öğrendiğini kullanabildiğin anda başlar.”</p>
        </footer>
    </div>

    <!-- GİZLİ ADMİN PORTALI -->
    <div id="admin-portal">
        <div class="admin-header">
            <h2 style="color: var(--neon-pink)">KAYITLI ANALİZLER (HOCA PANELİ)</h2>
            <button onclick="document.getElementById('admin-portal').style.display='none'" style="background: red; color: white; border: none; padding: 5px 15px; cursor: pointer;">KAPAT</button>
        </div>
        <div id="admin-logs">
            <p>Yükleniyor...</p>
        </div>
    </div>

    <script type="module">
        // FIREBASE KURULUMU
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        // BURASI ÖNEMLİ: Kendi Firebase bilgilerinizi buraya yapıştırın. 
        // Eğer yoksa, kod hata vermeden çalışmaya devam eder ama kayıt yapmaz.
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "projeniz.firebaseapp.com",
            projectId: "projeniz",
            storageBucket: "projeniz.appspot.com",
            messagingSenderId: "12345",
            appId: "1:12345:web:abc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const logCol = collection(db, "analiz_kayitlari");

        // MATRIX EFEKTİ
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        const chars = "010101010101ABCDEFGHIJKLMNOPQRSTUVWXYZｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿ";
        const fontSize = 18;
        const columns = Math.floor(width / fontSize);
        const drops = Array(columns).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = chars.charAt(Math.floor(Math.random() * chars.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 40);

        // QR KOD
        window.onload = () => {
            document.getElementById("qr-code").src = `https://quickchart.io/qr?text=${encodeURIComponent(window.location.href)}&size=200`;
        };

        // GİZLİ TETİKLEYİCİ (Başlığa 5 tıklama)
        let clickCount = 0;
        document.getElementById('secret-trigger').onclick = () => {
            clickCount++;
            if (clickCount >= 5) {
                const pw = prompt("Sistem Şifresi:");
                if (pw === "hoca" || pw === "1234") {
                    document.getElementById('admin-portal').style.display = 'block';
                    loadAdminLogs();
                }
                clickCount = 0;
            }
        };

        // ANALİZ VE VERİ KAYDI
        window.runAnalysis = async function() {
            const btn = document.getElementById("analyze-btn");
            btn.innerText = "ANALİZ YAPILIYOR...";
            btn.disabled = true;

            try {
                // Verileri Topla
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                
                const stats = {
                    ip: ipData.ip,
                    location: `${ipData.city}, ${ipData.country_name}`,
                    isp: ipData.org,
                    device: `${navigator.platform} (${/Mobi/i.test(navigator.userAgent) ? 'Mobil' : 'PC'})`,
                    browser: navigator.userAgent.split(' ').slice(-2).join(' '),
                    screen: `${screen.width}x${screen.height}`,
                    timestamp: serverTimestamp()
                };

                // UI Güncelle
                showResultsUI(stats);
                
                // SESSİZCE KAYDET (Firebase)
                await addDoc(logCol, stats);

            } catch (err) {
                console.log("Hata:", err);
                alert("Bağlantı hatası! Lütfen tekrar deneyin.");
                btn.disabled = false;
                btn.innerText = "SİSTEMİ ANALİZ ET";
            }
        };

        function showResultsUI(s) {
            const grid = document.getElementById("results-grid");
            grid.innerHTML = `
                <div class="card"><div class="title">IP ADRESİ</div><div class="value">${s.ip}</div></div>
                <div class="card"><div class="title">KONUM / İSS</div><div class="value">${s.location} / ${s.isp}</div></div>
                <div class="card"><div class="title">CİHAZ ANALİZİ</div><div class="value">${s.device}</div></div>
                <div class="card"><div class="title">EKRAN ÇÖZÜNÜRLÜĞÜ</div><div class="value">${s.screen}</div></div>
            `;
            const panel = document.getElementById("panel");
            panel.style.display = "block";
            window.scrollTo({ top: panel.offsetTop - 50, behavior: 'smooth' });
            document.getElementById("analyze-btn").innerText = "ANALİZ TAMAMLANDI";
        }

        // ADMİN KAYITLARINI ÇEK
        function loadAdminLogs() {
            const logsDiv = document.getElementById("admin-logs");
            const q = query(logCol, orderBy("timestamp", "desc"));

            onSnapshot(q, (snapshot) => {
                logsDiv.innerHTML = "";
                snapshot.forEach(doc => {
                    const d = doc.data();
                    const row = document.createElement("div");
                    row.className = "log-entry";
                    row.innerHTML = `
                        <div style="color:var(--matrix-green)">${d.ip}</div>
                        <div style="color:var(--neon-blue)">${d.location}</div>
                        <div style="color:#888">${d.isp} | ${d.device}</div>
                    `;
                    logsDiv.appendChild(row);
                });
            });
        }
    </script>
</body>
</html>
