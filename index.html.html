<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Gölge Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK (Version 8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --matrix-green: #00ff41; --bg-black: #000; --neon-pink: #ff00ff; --neon-blue: #00e5ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Orbitron', sans-serif; background-color: var(--bg-black); color: white; overflow-x: hidden; min-height: 100vh; }
        #matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .content-layer { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; background: rgba(0, 0, 0, 0.4); }
        .container { max-width: 1100px; width: 95%; margin: auto; padding: 60px 20px; text-align: center; }
        h1 { font-size: clamp(24px, 5vw, 42px); color: var(--neon-blue); text-shadow: 0 0 20px var(--neon-blue); margin-bottom: 30px; cursor: pointer; }
        .intro-text { font-size: 18px; line-height: 1.6; margin-bottom: 10px; text-shadow: 2px 2px 10px #000; }
        .main-btn { margin: 30px 0; padding: 20px 40px; border: 2px solid var(--matrix-green); background: rgba(0, 0, 0, 0.9); color: var(--matrix-green); font-family: 'Orbitron'; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 12px; box-shadow: 0 0 20px var(--matrix-green); transition: all 0.3s ease; }
        .main-btn:hover { background: var(--matrix-green); color: black; transform: scale(1.05); }
        .qr-section { margin-top: 20px; padding: 20px; background: rgba(255, 0, 255, 0.05); border: 1px solid var(--neon-pink); border-radius: 20px; backdrop-filter: blur(10px); display: inline-block; }
        .qr-image { background: white; padding: 10px; border-radius: 10px; width: 150px; height: 150px; margin: 10px auto; display: block; }
        .panel { display: none; margin-top: 50px; width: 100%; animation: slideUp 0.8s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .card { background: rgba(0, 0, 0, 0.9); border: 1px solid var(--neon-blue); border-radius: 12px; padding: 15px; text-align: left; }
        .card .title { color: var(--neon-blue); font-size: 11px; margin-bottom: 5px; border-bottom: 1px solid rgba(0,229,255,0.2); }
        .card .value { font-family: 'JetBrains Mono'; font-size: 13px; word-break: break-all; color: #fff; }
        #admin-panel { display: none; background: #111; border: 2px solid var(--matrix-green); margin-top: 50px; padding: 20px; border-radius: 15px; width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 11px; color: #fff; min-width: 1000px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
        th { background: #222; color: var(--matrix-green); }
        .status-badge { padding: 2px 5px; border-radius: 4px; font-size: 10px; }
        .badge-red { background: #ff0055; color: white; }
        .badge-green { background: #00ff41; color: black; }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <div class="content-layer">
        <div class="container">
            <h1 id="main-title" onclick="handleAdminClick()">Dijital Gölgen Kimin Ellerinde?</h1>
            <p class="intro-text">Sistemdeki dijital izin her yerde. Analiz et ve gör.</p>
            <button class="main-btn" onclick="runAnalysis()">SİSTEMİ ANALİZ ET</button>
            
            <div class="qr-section">
                <h2 style="color: var(--neon-pink); font-size: 14px;">📱 MOBİL TEST</h2>
                <img id="qr-code" class="qr-image" src="" alt="QR">
            </div>

            <div class="panel" id="user-panel">
                <div class="grid">
                    <div class="card"><div class="title">IP / VPN</div><div id="v-ip" class="value">...</div></div>
                    <div class="card"><div class="title">KONUM</div><div id="v-loc" class="value">...</div></div>
                    <div class="card"><div class="title">CİHAZ</div><div id="v-dev" class="value">...</div></div>
                    <div class="card"><div class="title">TARAYICI</div><div id="v-brw" class="value">...</div></div>
                    <div class="card"><div class="title">EKRAN</div><div id="v-scr" class="value">...</div></div>
                    <div class="card"><div class="title">BATARYA</div><div id="v-bat" class="value">...</div></div>
                    <div class="card"><div class="title">HIZ</div><div id="v-spd" class="value">...</div></div>
                </div>
            </div>

            <div id="admin-panel">
                <h2 style="color: var(--matrix-green);">SİSTEM KAYITLARI (GÜNCEL)</h2>
                <table>
                    <thead>
                        <tr><th>Zaman</th><th>IP / Konum</th><th>Cihaz</th><th>Tarayıcı</th><th>Ekran</th><th>Pil</th><th>Hız</th><th>VPN</th></tr>
                    </thead>
                    <tbody id="admin-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDTIhCipnX9D1dSRAQZSWz6sZb0gBUPDq8",
            authDomain: "dijital-golgen-kimin-ellerinde.firebaseapp.com",
            projectId: "dijital-golgen-kimin-ellerinde",
            storageBucket: "dijital-golgen-kimin-ellerinde.firebasestorage.app",
            messagingSenderId: "540853859036",
            appId: "1:540853859036:web:742ad324abbfdb90fc7a19"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function runAnalysis() {
            document.getElementById("user-panel").style.display = "block";
            
            // Verileri önce hazırla
            let data = {
                ip: "Bilinmiyor",
                loc: "Bilinmiyor",
                vpn: "HAYIR",
                dev: navigator.platform || "Bilinmiyor",
                brw: navigator.userAgent.split(' ').slice(-3).join(' '), // Tarayıcı bilgisini temizle
                scr: window.screen.width + "x" + window.screen.height,
                bat: "Erişim Yok",
                spd: "Bilinmiyor",
                timestamp: new Date().toISOString()
            };

            // IP API'den veriyi bekle (AWAIT)
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                data.ip = d.ip || "Bilinmiyor";
                data.loc = (d.city || "") + "/" + (d.country_name || "");
                data.vpn = ["vpn","proxy","hosting"].some(k => (d.org||"").toLowerCase().includes(k)) ? "EVET" : "HAYIR";
                
                document.getElementById("v-ip").innerText = data.ip;
                document.getElementById("v-loc").innerText = data.loc;
            } catch(e) { console.error("IP Hatası"); }

            // Batarya verisini bekle
            if (navigator.getBattery) {
                try {
                    const b = await navigator.getBattery();
                    data.bat = "%" + Math.round(b.level * 100) + (b.charging ? " [Şarjda]" : "");
                } catch(e) {}
            }
            
            // İnternet hızı
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if(conn) data.spd = (conn.effectiveType || "").toUpperCase() + " (" + (conn.downlink || "0") + "Mbps)";

            // UI Güncelle
            document.getElementById("v-dev").innerText = data.dev;
            document.getElementById("v-brw").innerText = data.brw;
            document.getElementById("v-scr").innerText = data.scr;
            document.getElementById("v-bat").innerText = data.bat;
            document.getElementById("v-spd").innerText = data.spd;

            // ŞİMDİ KAYDET (Tüm veriler doluyken)
            await db.collection("analizler").add(data);
            console.log("Veri başarıyla gönderildi");
        }

        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = res; res();
        const drops = Array(Math.floor(canvas.width/18)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#0f0'; ctx.font = '18px monospace';
            drops.forEach((y, i) => {
                ctx.fillText("01"[Math.floor(Math.random()*2)], i*18, y*18);
                if (y*18 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 40);
        window.onload = () => { document.getElementById("qr-code").src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(window.location.href)}`; };

        let clickCount = 0;
        function handleAdminClick() {
            clickCount++;
            if (clickCount === 5) {
                const pass = prompt("Şifre:");
                if (pass === "1234" || pass === "hoca") {
                    document.getElementById("admin-panel").style.display = "block";
                    loadAdminData();
                }
                clickCount = 0;
            }
        }

        function loadAdminData() {
            // Verileri en yeniden eskiye çek ve dinle
            db.collection("analizler").orderBy("timestamp", "desc").limit(30).onSnapshot(snap => {
                const tbody = document.getElementById("admin-table-body");
                tbody.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    tbody.innerHTML += `<tr>
                        <td>${new Date(d.timestamp).toLocaleTimeString()}</td>
                        <td>${d.ip || '---'}<br><small>${d.loc || '---'}</small></td>
                        <td>${d.dev || '---'}</td>
                        <td>${d.brw || '---'}</td>
                        <td>${d.scr || '---'}</td>
                        <td>${d.bat || '---'}</td>
                        <td>${d.spd || '---'}</td>
                        <td><span class="status-badge ${d.vpn === 'EVET' ? 'badge-red' : 'badge-green'}">${d.vpn || 'HAYIR'}</span></td>
                    </tr>`;
                });
            });
        }
    </script>
</body>
</html>
